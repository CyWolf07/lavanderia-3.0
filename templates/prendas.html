<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prendas - Lavandería</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h2>Listado de prendas</h2>
    <a href="{{ url_for('prendas.nueva') }}">➕ Registrar nueva prenda</a>
    <ul>
        {% for prenda in prendas %}
            <li>{{ prenda.nombre }} - {{ prenda.tipo }} - ${{ prenda.precio }}</li>
        {% else %}
            <li>No hay prendas registradas.</li>
        {% endfor %}
    </ul>
</body>
</html>
