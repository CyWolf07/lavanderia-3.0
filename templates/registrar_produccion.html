<!DOCTYPE html>
<html>

<head>
<title>Registrar Producción</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:40px;
}

form{
background:white;
padding:20px;
width:300px;
border-radius:8px;
}

input,select{
width:100%;
padding:8px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h2>Registrar Producción</h2>

<form method="POST">

<label>Prenda</label>

<select name="prenda" required>

{% for prenda in prendas %}

<option value="{{ prenda.id }}">

{{ prenda.nombre }} - ${{ prenda.precio }}

</option>

{% endfor %}

</select>

<label>Cantidad</label>

<input type="number" name="cantidad" required>

<button type="submit">

Registrar Producción

</button>

</form>

<br>

<a href="{{ url_for('produccion.dashboard') }}">

Volver al Dashboard

</a>

</body>

</html>
